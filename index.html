<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Math Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- 開始畫面 -->
        <div id="start-screen" class="screen">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRn74k9jrdLZiWw0dCfb06gfj7SzsJbSBR0cQ&s" alt="Game Logo" class="logo">
            <h1>數學對戰</h1>
            <button id="start-button">開始遊戲</button>
        </div>

        <!-- 選擇 Pokémon 畫面 -->
        <div id="selection-screen" class="screen hidden">
            <h2 id="selection-title">選擇你的 Pokémon</h2>
            <div id="enemy-info">
                <p>你的對手將會是：</p>
                <img id="enemy-preview-img" src="" alt="Enemy Pokémon">
                <p id="enemy-preview-name"></p>
            </div>
            <div id="pokemon-selection-grid"></div>
            <button id="confirm-selection-button" disabled>確定選擇</button>
        </div>

        <!-- 戰鬥畫面 -->
        <div id="battle-screen" class="screen hidden">
            <button id="pause-button">暫停</button>
            <div id="battle-arena">
                <div class="pokemon-display enemy">
                    <div class="status-box">
                        <span id="enemy-name"></span>
                        <div class="hp-bar-container"><div id="enemy-hp-bar" class="hp-bar"></div></div>
                    </div>
                    <img id="enemy-pokemon" src="" alt="Enemy Pokémon">
                </div>
                <div class="pokemon-display player">
                     <img id="player-pokemon" src="" alt="Player Pokémon">
                    <div class="status-box">
                        <span id="player-name"></span>
                        <div class="hp-bar-container"><div id="player-hp-bar" class="hp-bar"></div></div>
                        <div id="evolution-progress">答對題數: <span id="evo-counter">0</span></div>
                    </div>
                </div>
            </div>
            <div id="message-log"></div>
            <div id="question-area">
                <div id="timer-container"><div id="timer-bar"></div></div>
                <p id="question-text"></p>
                <div id="options-container"></div>
            </div>
        </div>
        
        <!-- 暫停遮罩 -->
        <div id="pause-overlay" class="overlay hidden">
            <h1>遊戲暫停</h1>
            <button id="resume-button">返回遊戲</button>
        </div>

        <!-- 教學遮罩 -->
        <div id="teaching-overlay" class="overlay hidden">
            <div id="teaching-box">
                <h2>答錯了！</h2>
                <p id="teaching-text"></p>
                <div id="teaching-timer">教學將在 <span id="teaching-countdown">10</span> 秒後結束...</div>
            </div>
        </div>

        <!-- 遊戲結束畫面 -->
        <div id="end-screen" class="screen hidden">
            <h2 id="end-message"></h2>
            <img id="capture-result-img" src="" alt="Result" class="hidden">
            <p id="capture-text"></p>
            <div id="end-buttons-container">
                <button id="play-again-new-pokemon-button">重選 Pokémon</button>
                <button id="play-again-legendary-button">使用傳說 Pokémon</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
